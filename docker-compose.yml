services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cissp
      POSTGRES_USER: cissp
      POSTGRES_PASSWORD: cissp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cissp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://cissp:cissp@postgres:5432/cissp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: admin
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8000:8000"
    volumes:
      # Seeded ETL datasets live at the repo root (not inside the backend
      # build context), so mount them read-only for the import pipeline.
      - ./docs/questions:/app/docs/questions:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
